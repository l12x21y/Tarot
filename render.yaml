services:
  - type: web
    name: interpretive-friction-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: RECORDING_PORT
        value: 10000
      - key: ALLOWED_ORIGIN
        value: https://vermillion-cheesecake-29e6d1.netlify.app/
    # 注意：Render 免费计划不支持持久化磁盘
    # 如果需要持久化数据，请考虑使用外部数据库服务或升级到付费计划
